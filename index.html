  <!-- Google Fonts -->

  <style>
    :root {
      --color-primary: #881337; /* Rose 900 */
      --color-secondary: #fef08a; /* Yellow 200 / Gold */
    }

    body {
      font-family: 'Mukta Malar', sans-serif;
      background-color: #fdfbf7;
      overflow-x: hidden;
    }

    h1, h2, h3, .font-serif {
      font-family: 'Playfair Display', serif;
    }

    .font-cursive {
      font-family: 'Great Vibes', cursive;
    }
    
    .text-gold {
      background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .bg-gold {
      background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
    }

    .pattern-bg {
      background-color: #881337;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239f1239' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    @keyframes confetti {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    .animate-confetti {
      animation-name: confetti;
      animation-timing-function: linear;
      animation-fill-mode: forwards;
    }

    .floating {
      animation: floating 3s ease-in-out infinite;
    }

    @keyframes floating {
      0% { transform: translate(0, 0px); }
      50% { transform: translate(0, 15px); }
      100% { transform: translate(0, -0px); }
    }

    /* Scroll Reveal Styles */
    .reveal {
      transition-property: all;
      transition-duration: 1000ms;
      transition-timing-function: cubic-bezier(0, 0, 0.2, 1);
    }
    
    .reveal-up { opacity: 0; transform: translateY(3rem); }
    .reveal-down { opacity: 0; transform: translateY(-3rem); }
    .reveal-left { opacity: 0; transform: translateX(3rem); }
    .reveal-right { opacity: 0; transform: translateX(-3rem); }
    .reveal-scale { opacity: 0; transform: scale(0.9); }
    
    .reveal.is-visible {
      opacity: 1;
      transform: translate(0) scale(1);
    }
  </style>
</head>
